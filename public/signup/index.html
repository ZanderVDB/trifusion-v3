<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Trifusion — Request Access</title>
<link rel="stylesheet" href="/shared.css"/>
<style>
  body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#050b14}
  .wrap{width:100%;max-width:420px;padding:0 20px}
  .logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;justify-content:center}
  .logo-icon{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#38bdf8,#6366f1);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:#fff}
  .logo-text{font-weight:700;font-size:22px;color:#f1f5f9}
  .logo-sub{font-size:12px;color:#64748b}
  .card{background:#0a1220;border:1px solid #1e293b;border-radius:16px;padding:32px}
  .card-title{font-size:20px;font-weight:700;color:#f1f5f9;margin-bottom:4px}
  .card-sub{font-size:13px;color:#64748b;margin-bottom:24px}
  .field{margin-bottom:16px}
  .label{display:block;font-size:12px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
  .input{width:100%;background:#050b14;border:1px solid #1e293b;border-radius:10px;padding:11px 14px;color:#f1f5f9;font-size:14px;outline:none;box-sizing:border-box;transition:border-color .15s}
  .input:focus{border-color:#38bdf8}
  .btn{width:100%;background:linear-gradient(135deg,#38bdf8,#6366f1);border:none;border-radius:10px;padding:13px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px}
  .btn:hover{opacity:.9}
  .btn:disabled{opacity:.5;cursor:default}
  .msg{font-size:13px;margin-top:10px;text-align:center;min-height:18px}
  .err{color:#f87171}
  .ok{color:#34d399}
  .footer{text-align:center;margin-top:20px;font-size:12px;color:#475569}
  .footer a{color:#38bdf8;text-decoration:none}
  .success-card{background:#0a2a1e;border:1px solid rgba(52,211,153,.3);border-radius:16px;padding:32px;text-align:center}
  .success-icon{font-size:48px;margin-bottom:16px}
  .success-title{font-size:20px;font-weight:700;color:#34d399;margin-bottom:8px}
  .success-text{font-size:14px;color:#86efac;line-height:1.6}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="logo-icon">T</div>
    <div>
      <div class="logo-text">Trifusion</div>
      <div class="logo-sub">Fleet Management Platform</div>
    </div>
  </div>

  <div class="card" id="form-card">
    <div class="card-title">Request Access</div>
    <div class="card-sub">Fill in your details and we'll review your request.</div>
    <div class="field">
      <label class="label">Company Name *</label>
      <input class="input" id="f-company" placeholder="e.g. Acme Fleet Solutions"/>
    </div>
    <div class="field">
      <label class="label">Your Name *</label>
      <input class="input" id="f-name" placeholder="e.g. John Smith"/>
    </div>
    <div class="field">
      <label class="label">Email Address</label>
      <input class="input" id="f-email" type="email" placeholder="your@email.com"/>
    </div>
    <div class="field">
      <label class="label">Choose a Username *</label>
      <input class="input" id="f-username" placeholder="e.g. acmefleet_admin"/>
    </div>
    <div class="field">
      <label class="label">Choose a Password *</label>
      <input class="input" id="f-password" type="password" placeholder="Min 8 characters"/>
    </div>
    <button class="btn" id="submit-btn" onclick="doSignup()">Submit Request</button>
    <div class="msg" id="msg"></div>
  </div>

  <div class="success-card" id="success-card" style="display:none">
    <div class="success-icon">✅</div>
    <div class="success-title">Request Submitted!</div>
    <div class="success-text">
      Your request has been sent to the WebAncher team.<br>
      You'll receive access once it's been reviewed and approved.<br><br>
      <strong>Username:</strong> <span id="success-username"></span>
    </div>
  </div>

  <div class="footer"><a href="/">← Back to sign in</a></div>
</div>
<script>
async function doSignup() {
  const companyName = document.getElementById('f-company').value.trim();
  const adminName   = document.getElementById('f-name').value.trim();
  const email       = document.getElementById('f-email').value.trim();
  const username    = document.getElementById('f-username').value.trim().toLowerCase();
  const password    = document.getElementById('f-password').value;
  const msgEl       = document.getElementById('msg');
  const btn         = document.getElementById('submit-btn');

  msgEl.className = 'msg err';
  if (!companyName) { msgEl.textContent = 'Please enter your company name.'; return; }
  if (!adminName)   { msgEl.textContent = 'Please enter your name.'; return; }
  if (!username)    { msgEl.textContent = 'Please choose a username.'; return; }
  if (password.length < 6) { msgEl.textContent = 'Password must be at least 6 characters.'; return; }

  btn.disabled = true; btn.textContent = 'Submitting…';
  try {
    const res  = await fetch('/api/signup', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ companyName, adminName, email, username, password }) });
    const data = await res.json();
    if (!data.ok) {
      msgEl.textContent = data.error || 'Something went wrong.';
      btn.disabled = false; btn.textContent = 'Submit Request';
      return;
    }
    document.getElementById('form-card').style.display = 'none';
    document.getElementById('success-card').style.display = 'block';
    document.getElementById('success-username').textContent = username;
  } catch(e) {
    msgEl.textContent = 'Could not connect to server.';
    btn.disabled = false; btn.textContent = 'Submit Request';
  }
}
document.addEventListener('keydown', e => { if(e.key==='Enter') doSignup(); });
</script>
<div style="position:fixed;bottom:0;left:0;right:0;height:26px;background:#050b14;border-top:1px solid #0d1829;display:flex;align-items:center;justify-content:center;z-index:50;pointer-events:none">
  <span style="font-size:11px;color:#1e293b;letter-spacing:.08em;font-weight:600">POWERED BY</span>
  <span style="font-size:11px;color:#334155;font-weight:700;margin-left:6px;letter-spacing:.04em">WEBANCHOR</span>
</div>
<div style="height:26px"></div><!-- footer spacer -->
</body>
</html>
