<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Trifusion — Admin</title>
<link rel="stylesheet" href="/shared.css"/>
<script src="/auth.js"></script>
<style>
  .job-card{background:#0a1220;border:1px solid #1e293b;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .15s;margin-bottom:8px}
  .job-card:hover{background:#0d1829}
  .job-card-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px}
  .job-id{font-family:'DM Mono',monospace;font-size:12px;color:#64748b}
  .job-name{font-weight:700;font-size:13px;color:#f1f5f9}
  .job-meta{display:flex;gap:12px;font-size:11px;color:#64748b;flex-wrap:wrap}
  .stat-card{background:#0a1220;border:1px solid #1e293b;border-radius:12px;padding:16px 18px}
  .stat-value{font-size:26px;font-weight:700}
  .stat-label{font-size:11px;color:#64748b;font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-top:4px}
  .step-check-admin{width:17px;height:17px;border-radius:4px;border:2px solid #334155;background:transparent;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
  .step-check-admin.done{background:#34d399;border-color:#34d399}
  .section-who{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:2px 6px;border-radius:4px;flex-shrink:0}
  .who-admin{background:#0c2a3a;color:#38bdf8}
  .who-installer{background:#1e1130;color:#a78bfa}

  .time-picker-wrap{display:flex;gap:6px;align-items:center}
  .time-sel{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:9px 8px;color:#e2e8f0;font-size:13px;font-family:inherit;cursor:pointer;text-align:center}
  .time-sel:focus{border-color:#38bdf8;outline:none}
  .hide-mobile { display:inline; }
  .show-mobile { display:none; }
  @media(max-width:600px){
    .hide-mobile{display:none}
    .show-mobile{display:inline}
    .topbar{gap:6px}
}
.topbar-brand { display:flex; flex-direction:column; justify-content:center; line-height:1.3; }
.topbar-brand-company { font-size:13px; font-weight:700; color:#f1f5f9; }
.topbar-brand-person  { font-size:11px; color:#64748b; font-weight:500; }
.topbar-centre { position:absolute; left:50%; transform:translateX(-50%); text-align:center; pointer-events:none; line-height:1.3; }
.topbar-service { font-size:12px; font-weight:600; color:#94a3b8; letter-spacing:.04em; }
.topbar-portal  { font-size:10px; color:#475569; letter-spacing:.06em; text-transform:uppercase; }
</style>
</head>
<body>
<div class="topbar">
    <div class="topbar-logo">
    <div class="logo-icon" id="topbar-logo-letter">T</div>
    <div class="topbar-brand">
      <div class="topbar-brand-company" id="topbar-company">—</div>
      <div class="topbar-brand-person" id="topbar-person">—</div>
    </div>
  </div>
  <div class="topbar-centre">
    <div class="topbar-service" id="topbar-org">— Service</div>
    <div class="topbar-portal">Admin Portal</div>
  </div>
  <div class="topbar-spacer"></div>
  <span id="msg-badge" style="display:none;cursor:pointer" onclick="setMainTab('messages',document.querySelector('[data-tab=messages]'))">
    <span style="font-size:13px;color:#94a3b8">Messages</span>
    <span class="badge-count" id="unread-count">0</span>
  </span>
  
  <button class="btn-primary" onclick="openNewJobModal()" style="font-size:13px;padding:7px 14px"><span class="hide-mobile">+ New Service</span><span class="show-mobile">+</span></button>
  <button class="btn-logout" onclick="tfLogout()">Sign Out</button>
</div>

<div class="page-wide">
  <!-- Main tabs -->
  <div class="tabs" style="margin-bottom:20px">
    <button class="tab-btn active" data-tab="overview" onclick="setMainTab('overview',this)">Overview</button>
    <button class="tab-btn" data-tab="jobs" onclick="setMainTab('jobs',this)">All Jobs<span class="tab-count" id="tc-jobs">0</span></button>
    <button class="tab-btn" data-tab="messages" onclick="setMainTab('messages',this)">Messages<span class="tab-count" id="tc-msgs">0</span></button>
    <button class="tab-btn" data-tab="users" onclick="setMainTab('users',this)">Team</button>
    <button class="tab-btn" data-tab="settings" onclick="setMainTab('settings',this)">Settings</button>
  </div>

  <!-- OVERVIEW -->
  <div id="tab-overview">
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px" id="stat-grid"></div>
    <div class="overview-cols" style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div>
        <div style="font-weight:600;font-size:13px;color:#94a3b8;margin-bottom:10px">🔴 Needs Attention</div>
        <div id="attention-list"></div>
      </div>
      <div>
        <div style="font-weight:600;font-size:13px;color:#94a3b8;margin-bottom:10px">📋 Active Installations</div>
        <div id="today-list"></div>
      </div>
    </div>
  </div>

  <!-- ALL JOBS -->
  <div id="tab-jobs" style="display:none">
    <div style="font-size:12px;color:#475569;margin-bottom:10px">Showing active jobs. Use the Status filter to include completed.</div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">
      <div style="position:relative;flex:1;min-width:200px">
        <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#64748b">🔍</span>
        <input id="search" type="text" placeholder="Search jobs…" class="form-input" style="padding-left:34px;width:100%" oninput="renderJobsTab()"/>
      </div>
      <select id="filter-status" class="form-input" style="width:180px" onchange="renderJobsTab()">
        <option value="">All Statuses (incl. Completed)</option>
        <option>Pending Acceptance</option>
        <option>Not Started</option>
        <option>In Progress</option>
        <option>Waiting for Docs</option>
        <option>Ready to Send</option>
        <option>Completed</option>
      </select>
      <select id="filter-client" class="form-input" style="width:140px" onchange="renderJobsTab()">
        <option value="">All Clients</option>
      </select>
      <select id="filter-installer" class="form-input" style="width:140px" onchange="renderJobsTab()">
        <option value="">All Installers</option>
        <option>Brigade</option>
        <option>Zamaka</option>
      </select>
    </div>
    <div id="jobs-list"></div>
  </div>

  <!-- MESSAGES -->
  <div id="tab-users" style="display:none">
    <div id="users-content"></div>
  </div>
  <div id="tab-settings" style="display:none">
    <div id="settings-content"></div>
  </div>
  <div id="tab-messages" style="display:none">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div style="font-weight:600;font-size:14px;color:#f1f5f9">Activity Log</div>
      <button class="btn-secondary btn-sm" onclick="markAllRead()">Mark all read</button>
    </div>
    <div class="card" style="padding:0;overflow:hidden" id="msg-list"></div>
  </div>
</div>

<!-- JOB DETAIL MODAL -->
<div class="modal-overlay" id="detail-modal" onclick="if(event.target===this)closeDetail()">
  <div class="modal fade-in" style="width:700px;max-height:90vh;overflow-y:auto">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px">
      <div class="modal-title" style="margin:0" id="modal-job-title">Job Detail</div>
      <div style="display:flex;gap:8px">
        <button class="btn-danger btn-sm" onclick="deleteJob(currentJobId)">🗑 Delete</button>
        <button class="btn-secondary btn-sm" onclick="closeDetail()">✕ Close</button>
      </div>
    </div>
    <div id="modal-job-content"></div>
  </div>
</div>

<script>

const _pathParts = window.location.pathname.split('/').filter(Boolean);
const COMPANY_ID = _pathParts[0] || '';
function capi(path) { return '/api/' + COMPANY_ID + path; }


let _refreshTimer = null;
function scheduleRefresh() {
  clearTimeout(_refreshTimer);
  _refreshTimer = setTimeout(() => { loadAll(); }, 300);
}
let jobs=[], currentJobId=null, mainTab='overview';


function fileUrl(url) {
  if (!url) return '#';
  // Append token to /r2/ URLs so they open in new tabs without auth error
  if (url.startsWith('/r2/')) {
    const token = getAuth()?.token || '';
    return url + '?token=' + token;
  }
  return url;
}
async function checkAuth() {
  const auth = getAuth();
  if (!auth || !auth.token || auth.role !== 'admin') {
    clearAuth();
    window.location.href = '/';
    return;
  }
  // Set topbar
  const _auth = getAuth();
  const _name = _auth?.name || 'Admin';
  const _leftComp   = _auth?.companyName || '';
  const _centreComp = _auth?.companyName || '';
  const el_co = document.getElementById('topbar-company');
  const el_pe = document.getElementById('topbar-person');
  const el_or = document.getElementById('topbar-org');
  const el_ll = document.getElementById('topbar-logo-letter');
  if (el_co) el_co.textContent = _leftComp || 'Company';
  if (el_pe) el_pe.textContent = _name;
  if (el_or) el_or.textContent = 'A ' + (_centreComp||'—') + ' Service';
  if (el_ll) el_ll.textContent = (_auth?.companyName||'?')[0].toUpperCase();
  loadAll();
  startSSE();
  setInterval(checkUnread,30000);
}
async function _oldLogout(){ try{ await apiFetch('/api/logout'); }catch(e){} clearAuth(); window.location.href='/'; }

let _sseInstance = null;
function startSSE(){
  if (_sseInstance) { try { _sseInstance.close(); } catch(e){} }
  const token=getAuth()?.token||'';
  const es=new EventSource(capi('/events')+'?token='+token);
  _sseInstance = es;
  let _sseConnected = false;
  es.onopen = () => { if (!_sseConnected) { _sseConnected=true; loadAll(); } };
  es.onmessage = e=>{try{const d=JSON.parse(e.data);if(d.type==='refresh'||d.type==='job_update'||d.type==='new_message')scheduleRefresh();}catch(ex){}};
  es.onerror   = ()=>setTimeout(startSSE,3000);
}

async function loadAll(){
  try {
    const r = await apiFetch(capi('/jobs'));
    if (r.status === 401) { clearAuth(); window.location.href='/'; return; }
    const data = await r.json();
    jobs = Array.isArray(data) ? data : [];
  } catch(e) { console.error('loadJobs error',e); return; }
  document.getElementById('tc-jobs').textContent=jobs.length;
  // Rebuild client filter dynamically
  const _fcEl = document.getElementById('filter-client');
  if (_fcEl) {
    const _curVal = _fcEl.value;
    const _clients = [...new Set(jobs.map(j=>j.clientId).filter(Boolean))];
    _fcEl.innerHTML = '<option value="">All Clients</option>' +
      _clients.map(id => {
        const j = jobs.find(x=>x.clientId===id);
        const name = j?.clientName||j?.clientCompanyName||id;
        return `<option value="${id}">${name}</option>`;
      }).join('');
    if (_curVal) _fcEl.value = _curVal;
  }
  // Always refresh overview stats so attention list stays current
  renderOverview();
  if(currentJobId){
    renderModalContent(currentJobId);
  }
  if(mainTab==='jobs') renderJobsTab();
  if(mainTab==='messages') loadMessages();
  checkUnread();
}

async function checkUnread(){
  const r=await apiFetch(capi('/messages/unread')).then(x=>x.json());
  const c=r.count;
  document.getElementById('tc-msgs').textContent=c;
  document.getElementById('unread-count').textContent=c;
  document.getElementById('msg-badge').style.display=c>0?'flex':'none';
}

async function markAllRead(){
  await apiFetch('/api/messages/read');
  checkUnread();
  loadMessages();
}

function setMainTab(tab,el){
  mainTab=tab;
  document.querySelectorAll('.tab-btn[data-tab]').forEach(b=>b.classList.remove('active'));
  if(el) el.classList.add('active');
  ['overview','jobs','messages','users','settings'].forEach(t=>{
    const el=document.getElementById('tab-'+t); if(el) el.style.display=t===tab?'block':'none';
  });
  if(tab==='messages') loadMessages();
  if(tab==='jobs') renderJobsTab();
  if(tab==='users') loadUsers();
  if(tab==='settings') loadSettings();
}

const STATUS_META = {
  'Pending Acceptance':      {color:'#fca5a5', bg:'#2a0f0f', dot:'#fca5a5'},
  'In Progress':             {color:'#4ade80', bg:'#0a2a1e', dot:'#4ade80'},
  'Awaiting System Check':   {color:'#38bdf8', bg:'#0c2a3a', dot:'#38bdf8'},
  'Waiting for Docs':        {color:'#fb923c', bg:'#2d1a0a', dot:'#fb923c'},
  'Awaiting Document Check': {color:'#a78bfa', bg:'#1e1130', dot:'#a78bfa'},
  'Completed':               {color:'#34d399', bg:'#0a2a1e', dot:'#34d399'},
  'Truck Unavailable':       {color:'#f87171', bg:'#2a0f0f', dot:'#f87171'},
  'Not Started':             {color:'#64748b', bg:'#1e293b', dot:'#64748b'},
};
function badgeHTML(s) {
  const m = STATUS_META[s] || STATUS_META['Not Started'];
  return `<span class="badge" style="background:${m.bg};color:${m.color};border:1px solid ${m.color}30"><span class="badge-dot" style="background:${m.dot}"></span>${s}</span>`;
}

function getJobBadge(j) {
  if (j.clientConfirmed) return badgeHTML('Completed');
  if (j.truckUnavailable) {
    return j.clientTruckReply
      ? '<span class="badge pulse" style="background:#0c2a3a;color:#38bdf8;border:1px solid #38bdf8">💬 Client Replied — Truck</span>'
      : '<span class="badge pulse" style="background:#2a0f0f;color:#f87171;border:1px solid #f87171">🚫 Truck Unavailable</span>';
  }
  if (j.problemReport?.status==='open')  return '<span class="badge pulse" style="background:#2a0f0f;color:#f87171;border:1px solid #f87171">⚠ Problem Reported</span>';
  if (j.problemReport?.status==='fixed') return '<span class="badge pulse" style="background:#451a00;color:#fbbf24;border:1px solid #fbbf24">🔧 Awaiting Admin Review</span>';
  const rp = j.rescheduleProposal?.status==='pending';
  if (rp) {
    const lr = j.rescheduleThread?.[j.rescheduleThread.length-1]?.role;
    const ct = !lr || lr==='installer';
    return ct
      ? '<span class="badge" style="background:#1e1130;color:#c084fc;border:1px solid #c084fc30">↺ Installer Waiting on Client</span>'
      : '<span class="badge" style="background:#451a00;color:#fbbf24;border:1px solid #fbbf2440">↺ Client Waiting on Installer</span>';
  }
  return badgeHTML(j.status);
}
function progressOf(cl){if(!cl)return{done:0,total:0};const all=cl.flatMap(s=>s.steps.filter(x=>!x.skipped));return{done:all.filter(x=>x.done).length,total:all.length};}


function jobUrgencyStyle(job){
  if(job.status==='Completed') return '';
  if(!job.date || !job.time) return '';
  const scheduled = new Date(job.date + 'T' + job.time);
  const now = new Date();
  const diffMins = (scheduled - now) / 60000;
  if(diffMins < 0 && diffMins > -120) return 'border-color:rgba(251,146,60,.7);box-shadow:0 0 0 1px rgba(251,146,60,.3);'; // happening now / just happened
  if(diffMins >= 0 && diffMins <= 60) return 'border-color:rgba(251,191,36,.8);box-shadow:0 0 0 1px rgba(251,191,36,.3);'; // within 1 hour
  if(diffMins > 60 && diffMins <= 180) return 'border-color:rgba(56,189,248,.5);box-shadow:0 0 0 1px rgba(56,189,248,.2);'; // within 3 hours
  return '';
}
function renderOverview(){
  const today=new Date().toISOString().slice(0,10);
  const active=jobs.filter(j=>j.status!=='Completed');
  const counts={
    total: jobs.length,
    active: active.length,
    pending: jobs.filter(j=>j.status==='Pending Acceptance').length,
    waiting: jobs.filter(j=>j.status==='Waiting for Docs').length,
    reschedule: jobs.filter(j=>j.rescheduleProposal?.status==='pending').length,
    completed: jobs.filter(j=>j.status==='Completed').length,
    today: jobs.filter(j=>j.date===today).length
  };
  document.getElementById('stat-grid').innerHTML=[
    {label:'Total Jobs',    value:counts.total,     color:'#94a3b8'},
    {label:'Active',        value:counts.active,    color:'#4ade80'},
    {label:'Pending Accept',value:counts.pending,   color:'#fca5a5'},
    {label:'Waiting Docs',  value:counts.waiting,   color:'#fb923c'},
    {label:'Reschedules',   value:counts.reschedule,color:'#f87171'},
    {label:'Completed',     value:counts.completed, color:'#64748b'},
  ].map(s=>`<div class="stat-card"><div class="stat-value" style="color:${s.color}">${s.value}</div><div class="stat-label">${s.label}</div></div>`).join('');

  // Attention list
  const attention=jobs.filter(j=>j.status!=='Completed'&&(j.truckUnavailable||j.problemReport||j.rescheduleProposal?.status==='pending'||j.needsAssignment));
  document.getElementById('attention-list').innerHTML=attention.length?attention.map(j=>{
    let reason='';
    if(j.truckUnavailable) reason='✕ Truck unavailable: '+(j.truckUnavailableReason||'').slice(0,60);
    else if(j.problemReport) reason='🚨 Problem: '+(j.problemReport.message||j.problemReport.reason||'').slice(0,60);
    else if(j.status==='Pending Acceptance') reason='🔴 Awaiting installer acceptance';
    else if(j.rescheduleProposal?.status==='pending') reason='⚠ Reschedule pending client response';
    else if(j.status==='Waiting for Docs') reason='📄 Waiting for installer documents';
    else if(!j.time) reason='🕐 No installation time set';
    return `<div class="job-card" onclick="openDetail('${j.id}')" style="${jobUrgencyStyle(j)}">
      <div class="job-card-top"><span class="job-id">${j.id}</span><span class="job-name">${j.name||j.location}</span>${getJobBadge(j)}</div>
      <div style="font-size:12px;color:#fb923c">${reason}</div>
    </div>`;
  }).join(''):'<div style="color:#334155;font-size:13px;padding:20px 0">Nothing needs attention right now</div>';

  // Active jobs only on overview
  const overviewJobs = jobs.filter(j=>j.status!=='Completed'&&!j.truckUnavailable&&!j.problemReport&&j.rescheduleProposal?.status!=='pending'&&!j.needsAssignment);
  document.getElementById('today-list').innerHTML = overviewJobs.length ? overviewJobs.map(j=>`
    <div class="job-card" onclick="openDetail('${j.id}')">
      <div class="job-card-top"><span class="job-id">${j.id}</span><span class="job-name">${j.name||j.location}</span>${getJobBadge(j)}</div>
      <div class="job-meta"><span>👤 ${j.clientName||'David'}</span><span>🔧 ${j.technician}</span><span>📅 ${j.date}${j.time?' '+j.time:''}</span><span>🚛 ${j.truck||'TBC'}</span>
      ${j.completionDate?`<span style="color:#64748b">✓ Done ${j.completionDate}</span>`:''}
      </div>
    </div>`).join('') : '<div style="color:#334155;font-size:13px;padding:20px 0">No jobs yet</div>';
}

function needsAttention(j) {
  return !!(j.rescheduleProposal?.status==='pending'||j.problemReport||j.truckUnavailable||j.needsAssignment);
}
function renderJobsTab(){
  const q=document.getElementById('search').value.toLowerCase();
  const fs=document.getElementById('filter-status').value;
  const fc=document.getElementById('filter-client')?.value||'';
  const fi=document.getElementById('filter-installer').value;
  let list = [...jobs]; // All jobs including completed
  if(q) list=list.filter(j=>(j.id+j.location+(j.name||'')+(j.truck||'')+j.technician).toLowerCase().includes(q));
  if(fs) {
    list = jobs.filter(j=>j.status!=='Completed');
    list = list.filter(j=>j.status===fs);
  }
  if(fc) list=list.filter(j=>(j.clientId)===fc);
  if(fi) list=list.filter(j=>j.technician===fi);
  const el=document.getElementById('jobs-list');
  if(!list.length){el.innerHTML='<div style="text-align:center;color:#334155;padding:50px 0;font-size:14px">No jobs match</div>';return;}
  el.innerHTML=list.map(j=>{
    const prog=progressOf(j.checklist);
    const pct=prog.total?Math.round(prog.done/prog.total*100):0;
    return `<div class="job-card" onclick="openDetail('${j.id}')" style="${jobUrgencyStyle(j)}">
      <div class="job-card-top">
        <span class="job-id">${j.id}</span><span class="job-name">${j.name||j.location}</span>${getJobBadge(j)}

      </div>
      <div class="job-meta">
        <span>📍 ${j.location}</span><span>🔧 ${j.technician}</span>
        <span>📅 ${j.date}${j.time?' '+j.time:''}</span><span>🌍 ${j.country}</span>
        <span>🔧 ${j.serviceType||'Installation'}</span>
        ${j.completionDate?`<span style="color:#34d399">✓ ${j.completionDate}</span>`:''}
      </div>
      ${j.jobStatusNote?`<div style="margin-top:5px;font-size:11px;color:#94a3b8;font-style:italic">ℹ ${j.jobStatusNote}</div>`:''}
      <div class="progress-wrap" style="margin-top:8px">
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%;background:${pct===100?'#34d399':'#38bdf8'}"></div></div>
        <span class="progress-label">${prog.done}/${prog.total}</span>
      </div>
    </div>`;
  }).join('');
}

async function loadMessages(){
  try {
    const res  = await apiFetch(capi('/messages'));
    const msgs = await res.json();
    const el   = document.getElementById('msg-list');
    if (!Array.isArray(msgs) || msgs.length === 0) {
      el.innerHTML = '<div style="padding:24px;color:#334155;font-size:13px">No messages yet</div>';
      return;
    }
    el.innerHTML = msgs.map(m => `
      <div class="msg-item ${m.read?'':'unread'}"
        style="padding:12px 16px;border-bottom:1px solid #1e293b;cursor:${m.job_id?'pointer':'default'};transition:background .1s"
        onmouseover="this.style.background='#0d1829'" onmouseout="this.style.background=''"
        onclick="${m.job_id?`openDetail('${m.job_id}');setMainTab('jobs',document.querySelector('[data-tab=jobs]'))`:''}">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:4px">
          <span style="background:#1e293b;color:#64748b;border-radius:5px;padding:1px 7px;font-size:10px;text-transform:uppercase;letter-spacing:.06em">${(m.type||'').replace(/_/g,' ')}</span>
          ${m.job_id?`<span style="font-size:11px;color:#38bdf8;font-weight:600">→ ${m.job_id}</span>`:''}
          <span style="font-size:11px;color:#334155;margin-left:auto">${m.created_at||''}</span>
          ${!m.read?'<span style="width:7px;height:7px;border-radius:50%;background:#38bdf8;flex-shrink:0"></span>':''}
        </div>

async function adminDeleteFile(jobId,secId,stepId,filename){
  if(!confirm('Remove this file?')) return;
  const res=await apiFetch(capi(`/jobs/${jobId}/file`),{method:'DELETE',body:JSON.stringify({secId,stepId,filename})});
  if((await res.json()).ok){
    const jobRes=await apiFetch(capi(`/jobs/${jobId}`));
    const updatedJob=await jobRes.json();
    const idx=jobs.findIndex(j=>j.id===jobId);
    if(idx>=0) jobs[idx]=updatedJob;
    renderModalContent(jobId);
  }
}
async function deleteJob(jobId){
  const job = jobs.find(j=>j.id===jobId);
  if(!job) return;
  if(!confirm('Delete '+job.id+' — '+(job.name||job.location)+'?\nThis cannot be undone.')) return;
  await apiFetch(capi('/jobs/'+jobId),{method:'DELETE'});
  closeDetail();
  loadAll();
}

function adminEditTime(jobId){
  const h = document.getElementById('admin-time-h-'+jobId)?.value;
  const m = document.getElementById('admin-time-m-'+jobId)?.value;
  if(h && m) adminEdit(jobId, 'time', h+':'+m);
}
async function adminToggleStep(jobId,secId,stepId,done){
  const res=await apiFetch(capi(`/jobs/${jobId}/step`),{method:'POST',body:JSON.stringify({secId,stepId,done})});
  const result=await res.json();
  // Fetch fresh job data so status updates immediately
  const jobRes=await apiFetch(capi(`/jobs/${jobId}`));
  const updatedJob=await jobRes.json();
  const idx=jobs.findIndex(j=>j.id===jobId);
  if(idx>=0) jobs[idx]=updatedJob;
  renderModalContent(jobId);
  // Also refresh overview counts
  renderOverview();
}

async function adminEdit(jobId,field,value){
  const j=jobs.find(x=>x.id===jobId);
  if(!j) return;
  j[field]=value;
  await apiFetch(capi(`/jobs/${jobId}`),{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(j)});
  loadAll();
}

async function adminSaveNote(jobId) {
  const area = document.getElementById('admin-note-area-'+jobId);
  const text = area?.value.trim();
  if (!text) return;
  await apiFetch(capi('/jobs/'+jobId+'/note'), {method:'POST', body:JSON.stringify({text})});
  area.value = '';
  loadAll();
  setTimeout(()=>openDetail(jobId), 300);
}
async function adminDeleteNote(jobId, idx) {
  await apiFetch(capi('/jobs/'+jobId+'/note/'+idx), {method:'DELETE'});
  loadAll();
  setTimeout(()=>openDetail(jobId), 300);
}

async function populateNewJobForm() {
  try {
    const res  = await apiFetch(capi('/form-data'));
    const data = await res.json();
    const clients    = data.clients    || [];
    const installers = data.installers || [];

    // Populate client dropdown grouped by company
    const clientSel = document.getElementById('an-client');
    if (clientSel) {
      const companies = {};
      clients.forEach(u => {
        const co = u.companyName || u.name;
        if (!companies[co]) companies[co] = [];
        companies[co].push(u);
      });
      clientSel.innerHTML = '<option value="">Select client…</option>';
      if (!clients.length) {
        clientSel.innerHTML = '<option value="">No clients added yet</option>';
      } else {
        Object.entries(companies).forEach(([co, members]) => {
          if (members.length === 1) {
            clientSel.innerHTML += `<option value="${members[0].clientId}">${co}</option>`;
          } else {
            members.forEach(u => {
              clientSel.innerHTML += `<option value="${u.clientId}">${co} — ${u.name}</option>`;
            });
          }
        });
      }
    }

    // Populate country dropdown from installer profiles + Other
    const countrySel = document.getElementById('an-country');
    if (countrySel) {
      const allCountries = [...new Set(installers.flatMap(u=>u.countries||[]))].sort();
      countrySel.innerHTML = '<option value="">Select country…</option>';
      if (!allCountries.length) {
        countrySel.innerHTML += '<option value="" disabled>No installers added yet</option>';
      } else {
        allCountries.forEach(co => { countrySel.innerHTML += `<option value="${co}">${co}</option>`; });
      }
      countrySel.innerHTML += '<option value="__other__">Other (type below)</option>';
    }
  } catch(e) {
    console.error('Could not load form data:', e);
  }
  updateJobInstallerHint();
}

function openNewJobModal() {
  document.getElementById('admin-new-modal').classList.add('open');

}
function closeNewJobModal() {
  document.getElementById('admin-new-modal').classList.remove('open');

  const sel = document.getElementById('an-country');

function updateJobInstallerHint() {

async function submitAdminJob() {
  const location = document.getElementById('an-location').value.trim();
  const date     = document.getElementById('an-date').value;
  const anTH     = document.getElementById('an-time-h')?.value;
  const anTM     = document.getElementById('an-time-m')?.value;
  const time     = (anTH && anTM) ? anTH+':'+anTM : '';
  const country = getSelectedCountry();
  if (!location) { alert('Please enter a location.'); return; }
  if (!country)  { alert('Please select a country.'); return; }
  if (!date)     { alert('Please select an installation date.'); return; }
  if (!time)     { alert('Please select an installation time.'); return; }
  if (!document.getElementById('an-client').value) { alert('Please select a client.'); return; }
  const btn = document.getElementById('an-submit-btn');
  btn.disabled = true; btn.textContent = 'Creating…';
  const res = await apiFetch(capi('/jobs'), {
    method: 'POST',
    body: JSON.stringify({
      location,
      truck:    document.getElementById('an-truck').value.trim(),
      country:  getSelectedCountry(),
      date,
      time:     (()=>{ const h=document.getElementById('an-time-h')?.value; const m=document.getElementById('an-time-m')?.value; return (h&&m)?h+':'+m:''; })(),
      unitType: document.getElementById('an-unit').value,
      serviceType: document.getElementById('an-service').value,
      clientId: document.getElementById('an-client').value,
    })
  });
  const data = await res.json();
  btn.disabled = false; btn.textContent = 'Create Installation';
  if (data.ok) { closeNewJobModal(); loadAll(); }
  else alert('Error: ' + (data.error || 'Unknown'));
}

function toggleEditUser(username) {
  // Toggle the read-only view panel
  const viewEl = document.getElementById('view-'+username);
  const editEl = document.getElementById('edit-'+username);
  const isOpen = viewEl?.style.display !== 'none' || editEl?.style.display !== 'none';
  if (viewEl) viewEl.style.display = isOpen ? 'none' : 'block';
  if (editEl) editEl.style.display = 'none';
}
function switchToEdit(username) {
  const viewEl = document.getElementById('view-'+username);
  const editEl = document.getElementById('edit-'+username);
  if (viewEl) viewEl.style.display = 'none';
  if (editEl) editEl.style.display = 'block';
}

async function saveUser(username, role) {
  const name       = document.getElementById('eu-name-'+username)?.value.trim();
  const newUsername= document.getElementById('eu-username-'+username)?.value.trim();
  const email      = document.getElementById('eu-email-'+username)?.value.trim();
  const password   = document.getElementById('eu-password-'+username)?.value;
  const company    = document.getElementById('eu-company-'+username)?.value.trim();
  const countries  = document.getElementById('eu-countries-'+username)?.value.split(',').map(s=>s.trim()).filter(Boolean);
  const msgEl      = document.getElementById('eu-msg-'+username);
  const body       = { name, email, companyName: company };
  if (password) body.password = password;
  if (newUsername && newUsername !== username) body.newUsername = newUsername;
  if (role==='installer') body.countries = countries;
  const res  = await apiFetch(capi('/users/'+username), { method:'PUT', body:JSON.stringify(body) });
  const data = await res.json();
  if (data.ok) { msgEl.textContent='Saved!'; setTimeout(()=>{ msgEl.textContent=''; loadUsers(); },1200); }
  else { msgEl.style.color='#f87171'; msgEl.textContent=data.error||'Error'; }
}

function openAddUser() { 
  ['au-name','au-username','au-password','au-company','au-installer-company','au-countries','au-email'].forEach(id=>{ const el=document.getElementById(id); if(el) el.value=''; });
  document.getElementById('au-msg').textContent='';
  document.getElementById('add-user-modal').classList.add('open'); 
}
function closeAddUser() { document.getElementById('add-user-modal').classList.remove('open'); }
function updateAddUserForm() {
  const role = document.getElementById('au-role')?.value;
  if (!role) return;
  document.getElementById('au-company-wrap').style.display           = role==='client'?'':'none';
  document.getElementById('au-installer-company-wrap').style.display = role==='installer'?'':'none';
  document.getElementById('au-countries-wrap').style.display          = role==='installer'?'block':'none';
}
async function submitAddUser() {
  const role     = document.getElementById('au-role').value;
  const name     = document.getElementById('au-name').value.trim();
  const username = document.getElementById('au-username').value.trim().toLowerCase();
  const password = document.getElementById('au-password').value;
  const email    = document.getElementById('au-email')?.value.trim()||'';
  const company  = role==='client'
    ? document.getElementById('au-company')?.value.trim()
    : document.getElementById('au-installer-company')?.value.trim();
  const countries= document.getElementById('au-countries')?.value.split(',').map(s=>s.trim()).filter(Boolean);
  const msgEl    = document.getElementById('au-msg');
  msgEl.style.color='#f87171';
  if (!name)     { msgEl.textContent='Full name is required.'; return; }
  if (!company)  { msgEl.textContent='Company name is required.'; return; }
  if (!username) { msgEl.textContent='Username is required.'; return; }
  if (!password) { msgEl.textContent='Password is required.'; return; }
  if (role==='installer' && (!countries||!countries.length)) { msgEl.textContent='At least one country is required for installers.'; return; }
  const res = await apiFetch(capi('/users'), { method:'POST', body:JSON.stringify({ role, name, username, password, email, companyName:company, countries }) });
  const data = await res.json();
  if (data.ok) { closeAddUser(); loadUsers(); }
  else { msgEl.textContent = data.error; }
}
async function deleteUser(username, name) {
  if (!confirm('Remove '+name+' from your team?')) return;
  await apiFetch(capi('/users/'+username), { method:'DELETE' });
  loadUsers();
}

async function saveOwnCredentials() {
  const newUsername = document.getElementById('s-own-username')?.value.trim();
  const newPassword = document.getElementById('s-own-password')?.value;
  const msgEl = document.getElementById('s-own-msg');
  if (!newUsername && !newPassword) { msgEl.style.color='#f87171'; msgEl.textContent='Enter a new username or password.'; return; }
  const auth = getAuth();
  const body = {};
  if (newPassword) body.password = newPassword;
  if (newUsername) body.newUsername = newUsername;
  const res  = await apiFetch(capi('/users/'+auth.username+'/credentials'), { method:'POST', body:JSON.stringify(body) });
  const data = await res.json();
  if (data.ok) {
    msgEl.style.color='#34d399'; msgEl.textContent='Updated! Please sign in again.';
    setTimeout(() => { clearAuth(); window.location.href='/'; }, 1500);
  } else { msgEl.style.color='#f87171'; msgEl.textContent=data.error||'Error'; }
}


function renderActivityLog(j) {
  const log = j.activityLog || [];
  if (!log.length) return '';
  const rows = log.map(e => `
    <div style="display:flex;gap:10px;padding:7px 0;border-bottom:1px solid #0d1829">
      <div style="width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px;background:${e.role==='client'?'#38bdf8':e.role==='installer'?'#a78bfa':e.role==='admin'?'#34d399':'#475569'}"></div>
      <div style="flex:1">
        <div style="display:flex;align-items:baseline;gap:8px;flex-wrap:wrap">
          <span style="font-size:12px;color:#f1f5f9;font-weight:600">${e.event}</span>
          <span style="font-size:10px;color:#475569">${e.who} · ${e.at}</span>
        </div>
        ${e.detail?`<div style="font-size:11px;color:#64748b;margin-top:2px;font-style:italic">"${e.detail}"</div>`:''}
      </div>
    </div>`).join('');
  return `<div class="card" style="margin-bottom:16px">
    <div class="card-title" style="margin-bottom:10px">📋 Activity Log</div>
    ${rows}
  </div>`;
}
