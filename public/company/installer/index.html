<!DOCTYPE html>
<!-- build: v4 -->
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Trifusion — Installer Portal</title>
<link rel="stylesheet" href="/shared.css"/>
<script src="/auth.js"></script>
<style>
  .job-card-left{display:flex;flex-direction:column;gap:2px;min-width:0}
  .job-card-badge{flex-shrink:0;text-align:right}
  .job-card{background:#0a1220;border:1px solid #1e293b;border-radius:12px;padding:16px 18px;cursor:pointer;transition:all .15s;margin-bottom:8px}
  .job-card:hover{background:#0d1829;transform:translateY(-1px)}
  .job-card-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px}
  .job-id{font-family:'DM Mono',monospace;font-size:12px;color:#64748b}
  .job-name{font-weight:700;font-size:14px;color:#f1f5f9}
  .job-meta{display:flex;gap:14px;font-size:12px;color:#64748b;flex-wrap:wrap}

  /* Accept banner */
  .accept-banner{background:linear-gradient(135deg,#0f2a0a,#1a3a12);border:1px solid rgba(74,222,128,.3);border-radius:12px;padding:20px 22px;margin-bottom:16px;text-align:center}
  .accept-banner-title{font-weight:700;font-size:16px;color:#f1f5f9;margin-bottom:6px}
  .accept-banner-sub{font-size:13px;color:#86efac;margin-bottom:16px}
  .accept-btn{background:linear-gradient(135deg,#16a34a,#15803d);border:none;border-radius:10px;padding:13px 32px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.02em}
  .accept-btn:hover{opacity:.88;transform:translateY(-1px)}


  /* Thread */
  .thread-msg{padding:7px 10px;border-radius:8px;margin-bottom:6px;font-size:12px}
  .thread-msg.installer{background:#1e1130;border:1px solid rgba(167,139,250,.2);color:#c4b5fd}
  .thread-msg.client{background:#0c2a3a;border:1px solid rgba(56,189,248,.2);color:#bae6fd}
  .thread-msg.system{background:#1e293b;color:#64748b;font-style:italic}
  .thread-meta{font-size:10px;opacity:.6;margin-bottom:3px}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="topbar">
    <div class="topbar-logo">
    <div class="logo-icon" id="topbar-logo-letter">T</div>
    <div class="topbar-brand">
      <div class="topbar-brand-company" id="topbar-company">—</div>
      <div class="topbar-brand-person" id="topbar-person">—</div>
    </div>
  </div>
  <div class="topbar-centre">
    <div class="topbar-service" id="topbar-org">— Service</div>
    <div class="topbar-portal">Installer Portal</div>
  </div>
  <div class="topbar-spacer"></div>
  
  <button class="btn-logout" onclick="tfLogout()">Sign Out</button>
</div>

<div class="page" id="dashboard" style="display:none">
  <div style="margin-bottom:20px">
    <h1 style="font-size:20px;font-weight:700;color:#f1f5f9" id="dash-title">My Jobs</h1>
    <p style="font-size:13px;color:#64748b;margin-top:3px">Your assigned services</p>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="setTab('active',this)">Active<span class="tab-count" id="tc-active">0</span></button>
    <button class="tab-btn" onclick="setTab('completed',this)">Completed<span class="tab-count" id="tc-completed">0</span></button>
    <button class="tab-btn" onclick="setTab('all',this)">All Jobs<span class="tab-count" id="tc-all">0</span></button>
  </div>
  <div id="all-filters" style="display:none;margin-bottom:12px;display:none">
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <input id="inst-search" type="text" placeholder="🔍 Search jobs…" class="form-input" style="flex:1;min-width:160px;font-size:13px" oninput="renderJobList()"/>
      <select id="inst-filter-status" class="form-input" style="width:160px;font-size:13px" onchange="renderJobList()">
        <option value="">All Statuses</option>
        <option>Pending Acceptance</option>
        <option>In Progress</option>
        <option>Awaiting System Check</option>
        <option>Waiting for Docs</option>
        <option>Awaiting Document Check</option>
        <option>Completed</option>
      </select>
    </div>
  </div>
  <div id="split-overview"></div>
  <div id="job-list" style="display:none"></div>
</div>

<div class="page" id="detail-view" style="display:none">
  <button class="btn-secondary" style="margin-bottom:16px" onclick="showDashboard()">← Back to My Jobs</button>
  <div id="detail-content"></div>
</div>

<!-- RESCHEDULE MODAL -->
<div class="modal-overlay" id="reschedule-modal">
  <div class="modal fade-in">
    <input type="hidden" id="reschedule-jobId"/>
    <div class="modal-title">Propose Reschedule</div>
    <p style="font-size:13px;color:#94a3b8;margin-bottom:16px">Suggest an alternative date and time to the client.</p>
    <div class="form-grid">
      <div class="form-field">
        <label class="form-label">Proposed Date</label>
        <input class="form-input" id="r-date" type="date"/>
      </div>
      <div class="form-field">
        <label class="form-label">Proposed Time</label>
        <div class="time-picker-wrap">
          <select class="time-sel form-input" id="r-time-h" style="flex:1"><option value="">HH</option><option value="00">00</option><option value="01">01</option><option value="02">02</option><option value="03">03</option><option value="04">04</option><option value="05">05</option><option value="06">06</option><option value="07">07</option><option value="08">08</option><option value="09">09</option><option value="10">10</option><option value="11">11</option><option value="12">12</option><option value="13">13</option><option value="14">14</option><option value="15">15</option><option value="16">16</option><option value="17">17</option><option value="18">18</option><option value="19">19</option><option value="20">20</option><option value="21">21</option><option value="22">22</option><option value="23">23</option></select>
          <span style="color:#64748b;font-weight:700">:</span>
          <select class="time-sel form-input" id="r-time-m" style="flex:1"><option value="00">00</option><option value="05">05</option><option value="10">10</option><option value="15">15</option><option value="20">20</option><option value="25">25</option><option value="30">30</option><option value="35">35</option><option value="40">40</option><option value="45">45</option><option value="50">50</option><option value="55">55</option></select>
        </div>
      </div>
      <div class="form-field" style="grid-column:1/-1">
        <label class="form-label">Note (optional)</label>
        <input class="form-input" id="r-note" placeholder="e.g. Technician unavailable that day"/>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-secondary" style="flex:1" onclick="closeReschedule()">Cancel</button>
      <button class="btn-primary" style="flex:2" onclick="submitReschedule()">Send Proposal</button>
    </div>
  </div>
</div>

<script>

const _pathParts = window.location.pathname.split('/').filter(Boolean);
const COMPANY_ID = _pathParts[0] || '';
function capi(path) { return '/api/' + COMPANY_ID + path; }


let _refreshTimer = null;
function scheduleRefresh() {
  clearTimeout(_refreshTimer);
  _refreshTimer = setTimeout(() => {
    if (!_noteJobId) loadJobs();
  }, 300);
}

function jobUrgencyStyle(job){
  if(job.status==='Completed') return '';
  if(!job.date || !job.time) return '';
  const svc = job.checklist?.find(s=>s.steps?.some(st=>st.id==='service_complete'));
  if(svc?.steps?.find(st=>st.id==='service_complete')?.done) return '';
  const scheduled = new Date(job.date + 'T' + job.time);
  const now = new Date();
  const diffMins = (scheduled - now) / 60000;
  if(diffMins <= 0)                          return 'border-color:rgba(248,113,113,.8);box-shadow:0 0 0 1px rgba(248,113,113,.3);';  // at or past time
  if(diffMins > 0   && diffMins <= 60)       return 'border-color:rgba(251,146,60,.7);box-shadow:0 0 0 1px rgba(251,146,60,.3);'; // within 1hr
  if(diffMins > 60  && diffMins <= 120)      return 'border-color:rgba(251,191,36,.8);box-shadow:0 0 0 1px rgba(251,191,36,.3);'; // 1-2hr before
  return '';
}

let jobs=[], currentJobId=null, currentTab='needs-attention', myInstaller='';




function fileUrl(url) {
  if (!url) return '#';
  // Append token to /r2/ URLs so they open in new tabs without auth error
  if (url.startsWith('/r2/')) {
    const token = getAuth()?.token || '';
    return url + '?token=' + token;
  }
  return url;
}
async function initPortal() {
  const auth = getAuth();
  if (!auth || !auth.token || auth.role !== 'installer') { clearAuth(); window.location.href='/'; return; }
  if (auth.companyId && auth.companyId !== COMPANY_ID) { clearAuth(); window.location.href='/'; return; }
  // Verify token is still valid server-side
  try {
    const me = await apiFetch('/api/me');
    const meData = await me.json();
    if (!meData.loggedIn || meData.role !== 'installer') {
      clearAuth(); window.location.href = '/'; return;
    }
  } catch(e) {
    clearAuth(); window.location.href = '/'; return;
  }
  document.getElementById('dashboard').style.display='block';
  myInstaller = auth.installer || '';
  // Set topbar — fetch fresh user data to get updated company name
  const _auth = getAuth();
  const _name = _auth?.name || 'Installer';
  const _centreComp = _auth?.companyName || '';
  // Start with cached values, then update from server
  const el_co = document.getElementById('topbar-company');
  const el_pe = document.getElementById('topbar-person');
  const el_or = document.getElementById('topbar-org');
  const el_ll = document.getElementById('topbar-logo-letter');
  if (el_pe) el_pe.textContent = _name;
  if (el_or) el_or.textContent = 'A ' + (_centreComp||'—') + ' Service';
  // Fetch fresh companyName from server
  apiFetch('/api/me').then(r=>r.json()).then(me=>{
    const freshComp = me.companyName || _auth?.installerCompanyName || _auth?.name || '';
    if (el_co) el_co.textContent = freshComp || 'Company';
    if (el_ll) el_ll.textContent = (freshComp||_name||' ')[0].toUpperCase();
    // Also update the stored auth token with fresh company name
    if (me.companyName && me.companyName !== _auth?.installerCompanyName) {
      const stored = getAuth();
      if (stored) { stored.installerCompanyName = me.companyName; setAuth(stored); }
    }
  }).catch(()=>{
    const fb = _auth?.installerCompanyName || _auth?.name || '';
    if (el_co) el_co.textContent = fb || 'Company';
    if (el_ll) el_ll.textContent = (fb||' ')[0].toUpperCase();
  });
  loadJobs();
  startSSE();
}

let _sseInstance = null;
function startSSE(){
  if (_sseInstance) { try { _sseInstance.close(); } catch(e){} }
  const token = getAuth()?.token||'';
  const es = new EventSource(capi('/events')+'?token='+token);
  _sseInstance = es;
  let _sseConnected = false;
  es.onopen = () => { if (!_sseConnected) { _sseConnected=true; loadJobs(); } }; // reload on (re)connect
  es.onmessage = e => { try { const d=JSON.parse(e.data); if(d.type==='refresh'||d.type==='job_update'||d.type==='new_message') scheduleRefresh(); } catch(ex){} };
  es.onerror = () => { setTimeout(startSSE, 3000); };
}

async function loadJobs(){
  try {
    const res = await apiFetch(capi('/jobs'));
    if (res.status === 401) { clearAuth(); window.location.href='/'; return; }
    const data = await res.json();
    if (!Array.isArray(data)) { console.error('Bad jobs response:', data); return; }
    jobs = data;
    // Always update counts
  document.getElementById('tc-active').textContent=jobs.filter(j=>j.status!=='Completed').length;
    document.getElementById('tc-completed').textContent=jobs.filter(j=>j.status==='Completed').length;
    if(currentJobId){
      const activeEl = document.activeElement;
      const isTypingNote = activeEl && activeEl.tagName === 'TEXTAREA' && activeEl.id.startsWith('note_');
      if(!isTypingNote) renderDetail(currentJobId);
    } else {
      renderDashboard();
    }
  } catch(e) {
    console.error('loadJobs error:', e);
  }
}

const STATUS_META = {
  'Pending Acceptance':      {color:'#fca5a5', bg:'#2a0f0f', dot:'#fca5a5'},
  'In Progress':             {color:'#fbbf24', bg:'#2d1a00', dot:'#fbbf24'},
  'Awaiting System Check':   {color:'#38bdf8', bg:'#0c2a3a', dot:'#38bdf8'},
  'Waiting for Docs':        {color:'#fb923c', bg:'#2d1a0a', dot:'#fb923c'},
  'Awaiting Document Check': {color:'#a78bfa', bg:'#1e1130', dot:'#a78bfa'},
  'Completed':               {color:'#34d399', bg:'#0a2a1e', dot:'#34d399'},
  'Vehicle Unavailable':       {color:'#f87171', bg:'#2a0f0f', dot:'#f87171'},
  'Not Started':             {color:'#64748b', bg:'#1e293b', dot:'#64748b'},
};
function badgeHTML(s) {
  const m = STATUS_META[s] || STATUS_META['Not Started'];
  return `<span class="badge" style="background:${m.bg};color:${m.color};border:1px solid ${m.color}30"><span class="badge-dot" style="background:${m.dot}"></span>${s}</span>`;
}

function getJobBadge(j) {
  if (j.forceCompleted) return '<span class="badge" style="background:#2d1209;color:#fb923c;border:1px solid #fb923c">⚠ Closed by Admin</span>';
  if (j.clientConfirmed) return badgeHTML('Completed');
  if (j.needsAssignment && !j.technician) return '<span class="badge pulse" style="background:#1e1130;color:#c084fc;border:1px solid #c084fc">⚠ Needs Installer Assignment</span>';
  if (j.truckUnavailable) {
    const label = j.clientTruckReply ? '🚫 Vehicle Unavailable — Awaiting Installer' : '🚫 Vehicle Unavailable — Awaiting Client';
    return '<span class="badge pulse" style="background:#2a0f0f;color:#f87171;border:1px solid #f87171">' + label + '</span>';
  }
  if (j.problemReport?.status === 'open') {
    const type = j.problemReport.checkpoint === 'documents' ? 'Document' : 'System';
    return '<span class="badge pulse" style="background:#2a0f0f;color:#f87171;border:1px solid #f87171">⚠ ' + type + ' Problem — Awaiting Installer</span>';
  }
  if (j.rescheduleProposal?.status === 'pending') {
    const lr = j.rescheduleThread?.[j.rescheduleThread.length - 1]?.role;
    const clientTurn = !lr || lr === 'installer';
    return clientTurn
      ? '<span class="badge pulse" style="background:#1e1130;color:#c084fc;border:1px solid #c084fc">↺ Reschedule — Awaiting Client</span>'
      : '<span class="badge pulse" style="background:#451a00;color:#fbbf24;border:1px solid #fbbf24">↺ Reschedule — Awaiting Installer</span>';
  }
  return badgeHTML(j.status);
}
function progressOf(cl){if(!cl)return{done:0,total:0};const all=cl.flatMap(s=>s.steps.filter(x=>!x.skipped));return{done:all.filter(x=>x.done).length,total:all.length};}

function setTab(tab,el){
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  const filt = document.getElementById('all-filters');
  if (filt) filt.style.display = tab==='all' ? 'block' : 'none';
  renderDashboard();
}

function renderDashboard(){
  document.getElementById('dashboard').style.display='block';
  document.getElementById('detail-view').style.display='none';
  document.getElementById('tc-active').textContent=jobs.filter(j=>j.status!=='Completed').length;
  document.getElementById('tc-completed').textContent=jobs.filter(j=>j.status==='Completed').length;
  document.getElementById('tc-all').textContent=jobs.length;
  if (currentTab==='active') {
    renderSplitOverview();
  } else {
    const el=document.getElementById('job-list');
    if(el) el.style.display='block';
    const ov=document.getElementById('split-overview');
    if(ov) ov.style.display='none';
    renderJobList();
  }
}

function renderSplitOverview(){
  const el=document.getElementById('job-list');
  if(el) el.style.display='none';
  const ov=document.getElementById('split-overview');
  if(!ov) return;
  ov.style.display='block';

  const needsAttn = jobs.filter(j=>{
    if(j.status==='Completed') return false;
    if(j.truckUnavailable) return true;
    if(j.problemReport?.status==='open') return true;
    if(j.rescheduleProposal?.status==='pending') return true;
    if(j.status==='Pending Acceptance') return true;
    // Orange = within 1hr, Red = past time
    const urg = jobUrgencyStyle(j);
    if(urg.includes('248,113,113') || urg.includes('251,146,60')) return true;
    return false;
  });
  const active = jobs.filter(j=>j.status!=='Completed'&&!needsAttn.includes(j));

  const cardHTML = (j) => {
    const prog=progressOf(j.checklist);const pct=prog.total?Math.round(prog.done/prog.total*100):0;
    return `<div class="job-card" onclick="showDetail('${j.id}')" style="${jobUrgencyStyle(j)}">
      <div class="job-card-top" style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px">
        <div style="min-width:0"><span class="job-id">${j.id}</span> <span class="job-name">${j.name||j.location}</span>
          <div class="job-meta" style="margin-top:3px"><span>🚛 ${j.truck||'TBC'}</span><span>📅 ${j.date}${j.time?' '+j.time:''}</span></div>
        </div>
        <div style="flex-shrink:0">${getJobBadge(j)}</div>
      </div>
      <div class="progress-wrap" style="margin-top:6px"><div class="progress-track"><div class="progress-fill" style="width:${pct}%;background:${pct===100?'#34d399':'#38bdf8'}"></div></div><span class="progress-label">${prog.done}/${prog.total}</span></div>
    </div>`;
  };

  ov.innerHTML = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <div>
      <div style="font-weight:600;font-size:13px;color:#94a3b8;margin-bottom:10px">🔴 Needs Attention</div>
      ${needsAttn.length ? needsAttn.map(cardHTML).join('') : '<div style="color:#334155;font-size:13px;padding:20px 0">Nothing needs attention</div>'}
    </div>
    <div>
      <div style="font-weight:600;font-size:13px;color:#94a3b8;margin-bottom:10px">📋 Active Installations</div>
      ${active.length ? active.map(cardHTML).join('') : '<div style="color:#334155;font-size:13px;padding:20px 0">No active jobs</div>'}
    </div>
  </div>`;
}

function renderJobList(){
  let list;
  if (currentTab==='needs-attention') {
    list = jobs.filter(j=>j.status!=='Completed' && (
      j.truckUnavailable || j.problemReport?.status==='open' ||
      j.rescheduleProposal?.status==='pending' ||
      (j.needsAssignment && !j.technician) ||
      j.status==='Pending Acceptance' ||
      jobUrgencyStyle(j).length > 0
    ));
  } else if (currentTab==='active') {
    list = jobs.filter(j=>j.status!=='Completed');
  } else if (currentTab==='completed') {
    list = jobs.filter(j=>j.status==='Completed');
  } else if (currentTab==='all') {
    list = [...jobs];
    const q  = document.getElementById('inst-search')?.value.toLowerCase()||'';
    const fs = document.getElementById('inst-filter-status')?.value||'';
    if (q)  list = list.filter(j=>(j.id+' '+j.location+' '+(j.clientCompanyName||'')+' '+(j.clientName||'')+' '+(j.country||'')+' '+(j.truck||'')+' '+(j.serviceType||'')+' '+(j.date||'')+' '+(j.technician||'')).toLowerCase().includes(q));
    if (fs) list = list.filter(j=>j.status===fs);
  } else {
    list = jobs.filter(j=>j.status!=='Completed');
  }
  const el = document.getElementById('job-list');
  if(!list.length){el.innerHTML='<div style="text-align:center;color:#334155;padding:50px 0;font-size:14px">No jobs here</div>';return;}
  el.innerHTML = list.map(j=>{
    const prog = progressOf(j.checklist);
    const pct  = prog.total ? Math.round(prog.done/prog.total*100) : 0;
    const isClientCounter = j.rescheduleProposal?.status==='pending' && j.rescheduleProposal?.proposedBy?.includes('(client)');
    const needsAccept = !j.accepted && !(j.checklist?.find(s=>s.id==='accepted')?.steps[0]?.done);
    return `<div class="job-card" onclick="showDetail('${j.id}')" style="${jobUrgencyStyle(j)}">
      <div class="job-card-top" style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px">
        <div class="job-card-left">
          <div style="display:flex;align-items:center;gap:8px">
            <span class="job-id">${j.id}</span>
            <span class="job-name">${j.name||j.location}</span>
          </div>
          <div class="job-meta" style="margin-top:4px">
            <span>🚛 ${j.truck||'TBC'}</span>
            <span>🔧 ${j.serviceType||'Installation'}</span>
            <span>📍 ${j.location}</span>
            <span>📅 ${j.date}${j.time?' '+j.time:''}</span>
            <span>🏢 ${j.clientCompanyName||j.clientName||'Client'}</span>
          </div>
        </div>
        <div class="job-card-badge">${getJobBadge(j)}</div>
      </div>
      <div class="progress-wrap" style="margin-top:8px">
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%;background:${pct===100?'#34d399':'#38bdf8'}"></div></div>
        <span class="progress-label">${prog.done}/${prog.total}</span>
      </div>
    </div>`;
  }).join('');
}

async function showDetail(id){currentJobId=id;document.getElementById('dashboard').style.display='none';document.getElementById('detail-view').style.display='block';renderDetail(id);}
function showDashboard(){
  currentJobId=null;
  document.getElementById('dashboard').style.display='block';
  document.getElementById('detail-view').style.display='none';
  // Refresh job list so statuses are current when returning from detail
  loadJobs();
}

function renderDetail(id){
  // Don't re-render if the user is actively typing in the notes field
  if(_noteJobId === id && document.activeElement?.id?.startsWith('note_')) return;
  try{
  const j = jobs.find(x=>x.id===id);
  if(!j) return;
  const prog = progressOf(j.checklist);
  const pct  = prog.total ? Math.round(prog.done/prog.total*100) : 0;
  const isClientCounter = j.rescheduleProposal?.status==='pending' && j.rescheduleProposal?.proposedBy?.includes('(client)');
  const isPending   = j.rescheduleProposal?.status==='pending' && !isClientCounter;
  const isAccepted  = !!j.accepted || !!(j.checklist?.find(s=>s.id==='accepted')?.steps[0]?.done);

  // Accept banner — shown if not yet accepted
  const acceptBanner = !isAccepted ? `
    <div class="accept-banner">
      <div class="accept-banner-title">New Service Job</div>
      <div class="accept-banner-sub">
        📍 ${j.location} &nbsp;|&nbsp; 📅 ${j.date}${j.time?' at '+j.time:' (time TBC)'} &nbsp;|&nbsp; 📦 ${j.unitType}
      </div>
      <button class="accept-btn" onclick="acceptJob('${j.id}')">✓ Accept This Service</button>
      <div style="margin-top:14px">
        <button class="btn-danger btn-sm" style="pointer-events:all;position:relative;z-index:10" onclick="event.stopPropagation();openReschedule('${j.id}')">✗ Can't Make This Time — Propose Alternative</button>
      </div>
    </div>` : '';

  // Reschedule banners
  const counterBanner = isClientCounter ? `
    <div style="background:#0a1f3a;border:2px solid #38bdf8;border-radius:12px;padding:18px 20px;margin-bottom:16px">
      <div style="font-weight:700;font-size:15px;color:#38bdf8;margin-bottom:8px">💬 Client Suggests a New Time</div>
      <div style="font-size:14px;color:#bae6fd;margin-bottom:6px">
        <b style="font-size:16px">${j.rescheduleProposal.proposedDate||j.date}${j.rescheduleProposal.proposedTime?' at '+j.rescheduleProposal.proposedTime:''}</b>
      </div>
      ${j.rescheduleProposal.note?`<div style="font-size:13px;color:#94a3b8;margin-bottom:12px">"${j.rescheduleProposal.note}"</div>`:'<div style="margin-bottom:12px"></div>'}
      <p style="font-size:12px;color:#64748b;margin-bottom:14px">Accepting this time will also confirm your acceptance of this service.</p>

      </button>
      <button class="btn-danger btn-sm" style="width:100%" onclick="openReschedule('${j.id}')">↺ Suggest a Different Time</button>
    </div>` : '';

  const pendingBanner  = isPending  ? `<div style="background:#0c2a3a;border:2px solid #38bdf8;border-radius:12px;padding:16px 18px;margin-bottom:16px"><div style="font-weight:700;font-size:14px;color:#38bdf8;margin-bottom:4px">↺ Waiting for Client Response</div><div style="font-size:13px;color:#94a3b8">Your alternative time has been sent to the client. You cannot accept or reject the job until he responds.</div></div>` : '';
  const acceptedReschedule = j.rescheduleProposal?.status==='accepted' ? `<div class="alert-success" style="margin-bottom:14px">✓ Time confirmed: ${j.date}${j.time?' at '+j.time:''}</div>` : '';
  const rejectedReschedule = j.rescheduleProposal?.status==='rejected' ? `<div class="alert-warn" style="margin-bottom:14px">✗ Client didn't accept the proposed time. Please contact admin or suggest another time.</div>` : '';

  // Reschedule thread
  const threadHTML = (isAccepted && j.rescheduleThread?.length) ? `
    <div class="card" style="margin-bottom:14px">
      <div class="card-title">↺ Scheduling Conversation</div>
      <div style="font-size:12px;color:#64748b;margin-bottom:8px">Original: <b style="color:#94a3b8">${j.date}${j.time?' at '+j.time:''}</b></div>

        </div>`).join('')}
    </div>` : '';

  // Checklist — locked if not accepted
  const checklistHTML = j.checklist ? j.checklist.map((sec,si)=>{
    const allDone  = sec.steps.every(s=>s.done||s.skipped);
    const sectionOrder = ['accepted','pre','service','documents'];
    const secIdx   = sectionOrder.indexOf(sec.id);
    const isLocked = !isAccepted || j.status==='Completed';
    // Sequential: each section locked until previous is done
    let isSequentiallyLocked = false;
    if (secIdx > 0) {
      const prevSec = j.checklist?.find(s=>s.id===sectionOrder[secIdx-1]);
      if (prevSec && !prevSec.steps.every(s=>s.done||s.skipped)) isSequentiallyLocked = true;

    const _locked = isLocked || isSequentiallyLocked;
    const _readOnly = allDone; // completed sections are read-only

    const headerColor = allDone ? '#34d399' : (sec.steps.some(s=>s.done) ? '#fbbf24' : '#38bdf8');

    const stepsHTML = sec.steps.map(step => {

        ${(step.uploadedFiles&&step.uploadedFiles.length)?`<div style="padding:6px 0 2px 0">
          ${step.uploadedFiles.map(f=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 8px;background:#0d1829;border-radius:7px;margin-bottom:4px">

        </div>
      </div>`;

      // ── Standard checkbox ───────────────────────────────────────────────────
      return `<div class="step-row">
        ${_readOnly
          ? `<div class="step-check done" style="cursor:default;flex-shrink:0"></div>`
          : _locked
            ? `<div class="step-check" style="cursor:not-allowed;opacity:.25;background:#0a1220;border-color:#1a2535;flex-shrink:0"></div>`
            : `<button class="step-check${step.done?' done':''}" onclick="toggleStep('${j.id}','${sec.id}','${step.id}',${!step.done})"></button>`
        }
        <span class="step-label${step.done?' done':''}">${step.label}</span>
      </div>`;
    }).join('');

    // Hide accepted section after job is accepted (it's handled by the banner)
    if (sec.id === 'accepted') return '';

    return `<div class="card" style="margin-bottom:12px;padding:0;overflow:hidden;border-color:${allDone?'rgba(52,211,153,.3)':_locked?'#1e293b':'rgba(56,189,248,.2)'}">
      <div class="section-header" style="background:${headerBg};cursor:default">
        <div class="section-num" style="background:${headerBg};border-color:${headerColor};color:${headerColor}">${allDone?'✓':si}</div>

          <div style="font-weight:700;font-size:13px;color:${allDone?'#34d399':_locked?'#475569':'#f1f5f9'}">${sec.title}</div>
          <div style="font-size:11px;color:${allDone?'#34d399':'#475569'}">${sec.subtitle}</div>

          _locked?`<span style="margin-left:auto;font-size:11px;color:#334155">🔒 Locked</span>`:''}
      </div>
      <div style="${_locked?'opacity:.5;pointer-events:none':''}">${stepsHTML}</div>

  }).join('') : '';

  const uploads = ''; // removed — files shown inline in checklist

  const problemBanner = ''; // handled inline below
  const confirmedBanner = j.clientConfirmed ? `
    <div style="background:#0a2a1e;border:2px solid #34d399;border-radius:12px;padding:14px 18px;margin-bottom:16px">
      <div style="font-weight:700;font-size:14px;color:#34d399;margin-bottom:4px">🎉 Job Fully Complete</div>
      <div style="font-size:12px;color:#86efac">Client confirmed documents are correct — ${j.clientConfirmedAt}</div>
    </div>` : (j.systemOk ? `
    <div style="background:#0a2a1e;border:1px solid #34d39940;border-radius:10px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px">
      <span style="font-size:18px">✅</span>
      <div>
        <div style="font-size:13px;color:#34d399;font-weight:600">✅ Client confirmed system is working</div>
      </div>
    </div>` : '');
  document.getElementById('detail-content').innerHTML = `
    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px">
        <div>
          <div style="font-family:'DM Mono',monospace;font-size:12px;color:#64748b;margin-bottom:4px">${j.id}</div>
          <div style="font-weight:700;font-size:20px;color:#f1f5f9;margin-bottom:8px">${j.name||j.location}</div>
          ${getJobBadge(j)}
          ${j.accepted?`<div style="font-size:11px;color:#4ade80;margin-top:6px">✓ Accepted ${j.acceptedAt||''}</div>`:''}
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px 20px">
          ${[['Client',j.clientCompanyName||j.clientName||'Client'],['Location',j.location],['Service',j.serviceType||'Installation'],['Date',j.date+(j.time?' '+j.time:' (TBC)')],['Unit',j.serviceType==='Inspection'?'—':j.unitType],['Truck',j.truck||'TBC'],['Country',j.country]]
            .map(([k,v])=>`<div><div style="font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:.06em">${k}</div><div style="font-size:13px;color:#e2e8f0;font-weight:500">${v}</div></div>`).join('')}
        </div>
      </div>
      <div class="progress-wrap" style="margin-top:14px">
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%;background:${pct===100?'#34d399':'#38bdf8'}"></div></div>
        <span class="progress-label">${prog.done}/${prog.total} steps complete</span>
      </div>
    </div>
    ${problemBanner}${confirmedBanner}${counterBanner}${acceptedReschedule}${rejectedReschedule}${(isClientCounter||isPending)?'':acceptBanner}${pendingBanner}
    ${threadHTML}

    ${isAccepted ? `<div>${checklistHTML}</div>` : `<div style="opacity:.4;pointer-events:none">${checklistHTML}</div>`}
    ${j.problemReport?.status==='open'?`
    <div style="background:#2a0f0f;border:2px solid #f87171;border-radius:12px;padding:16px 18px;margin-bottom:14px">
      <div style="font-weight:700;font-size:14px;color:#f87171;margin-bottom:6px">⚠ ${j.problemReport.checkpoint==='documents'?'Document':'System'} Problem — Reported by Client</div>
      <div style="font-size:13px;color:#fca5a5;margin-bottom:12px">"${j.problemReport.message||j.problemReport.reason||'No message'}"</div>
      <div style="font-size:11px;color:#475569;margin-bottom:10px">Reported ${j.problemReport.reportedAt}</div>
      <textarea id="fix-note-${j.id}" rows="2" placeholder="Briefly describe what you did to address this…"
        style="width:100%;background:#1e293b;border:1px solid #334155;border-radius:7px;padding:8px 10px;color:#e2e8f0;font-size:12px;font-family:inherit;resize:vertical;margin-bottom:8px"></textarea>
      <button onclick="markProblemFixed('${j.id}')" style="background:#14532d;border:1px solid #34d399;border-radius:8px;padding:9px 18px;color:#86efac;font-size:13px;font-weight:600;cursor:pointer;width:100%">
        ✓ Notify Client — Issue Addressed
      </button>
    </div>`:''}
    ${(()=>{
      const serviceComplete = j.checklist?.find(s=>s.id==='service')?.steps.find(s=>s.id==='service_complete')?.done;
      return isAccepted && !j.truckUnavailable && !j.clientConfirmed && !serviceComplete;
    })() ? `
    <div class="card" style="margin-top:14px;border-color:rgba(248,113,113,.2)">
      <div class="card-title" style="color:#f87171">⚠ Vehicle Unavailable?</div>
      <p style="font-size:13px;color:#94a3b8;margin-bottom:12px">If the truck could not be installed, mark it here and add a reason.</p>
      <textarea id="truck-reason" rows="2" placeholder="e.g. Truck wiring was damaged, driver not present…"
        style="width:100%;background:#1e293b;border:1px solid #334155;border-radius:7px;padding:8px 10px;color:#e2e8f0;font-size:12px;font-family:inherit;resize:vertical;margin-bottom:10px"></textarea>
      <div style="font-size:11px;color:#f87171;margin-bottom:4px">* Reason is required</div>
      <button onclick="markTruckUnavailable('${j.id}')" style="background:#7f1d1d;border:1px solid #f87171;border-radius:8px;padding:9px 18px;color:#fca5a5;font-size:13px;font-weight:600;cursor:pointer;width:100%">
        ✕ Mark Vehicle as Unavailable
      </button>
    </div>` : ''}
    ${j.truckUnavailable ? `
    <div style="background:#2a0f0f;border:2px solid #f87171;border-radius:12px;padding:16px 18px;margin-top:14px">
      <div style="font-weight:700;font-size:14px;color:#f87171;margin-bottom:6px">✕ Truck Marked Unavailable</div>
      ${j.truckUnavailableReason?`<div style="font-size:13px;color:#fca5a5;margin-bottom:6px">${j.truckUnavailableReason}</div>`:''}
      <div style="font-size:11px;color:#64748b;margin-bottom:10px">${j.truckUnavailableAt||''}</div>
      ${j.clientTruckReply?`<div style="margin-bottom:10px;padding:10px;background:#0c2a3a;border:1px solid rgba(56,189,248,.3);border-radius:8px">
        <div style="font-size:11px;color:#475569;margin-bottom:3px">${j.clientTruckReply.by} replied · ${j.clientTruckReply.at}</div>
        <div style="font-size:13px;color:#bae6fd">"${j.clientTruckReply.message}"</div>
      </div>`:''}
      <button onclick="undoTruckUnavailable('${j.id}')" style="background:#1e293b;border:1px solid #334155;border-radius:7px;padding:6px 14px;color:#94a3b8;font-size:12px;cursor:pointer">

  } catch(err) { console.error('renderDetail error:', err); document.getElementById('detail-content').innerHTML='<div style="color:#f87171;padding:20px">Error rendering job: '+err.message+'</div>'; }
}

async function acceptJob(jobId){
  const res=await apiFetch(capi(`/jobs/${jobId}/accept`),{method:'POST'});
  const data=await res.json();
  if(data.ok){
    // Fetch fresh job so status updates immediately
    const jobRes=await apiFetch(capi(`/jobs/${jobId}`));
    const updatedJob=await jobRes.json();
    const idx=jobs.findIndex(j=>j.id===jobId);
    if(idx>=0) jobs[idx]=updatedJob;
    renderDetail(jobId);
  document.getElementById('tc-active').textContent=jobs.filter(j=>j.status!=='Completed').length;
    document.getElementById('tc-completed').textContent=jobs.filter(j=>j.status==='Completed').length;
  } else alert('Error: '+(data.error||'Unknown'));
}
async function toggleStep(jobId,secId,stepId,done){
  const res = await apiFetch(capi(`/jobs/${jobId}/step`),{method:'POST',body:JSON.stringify({secId,stepId,done})});
  const result = await res.json();
  // Update just the step and status in local state — no full re-fetch so images don't flicker
  const job = jobs.find(j=>j.id===jobId);
  if(job){
    const sec = job.checklist?.find(s=>s.id===secId);
    const step = sec?.steps.find(s=>s.id===stepId);
    if(step) step.done = done;
    if(result.status) job.status = result.status;
    renderDetail(jobId);
  document.getElementById('tc-active').textContent=jobs.filter(j=>j.status!=='Completed').length;
    document.getElementById('tc-completed').textContent=jobs.filter(j=>j.status==='Completed').length;
  }
}
async function skipStep(jobId,secId,stepId){
  const res = await apiFetch(capi(`/jobs/${jobId}/step`),{method:'POST',body:JSON.stringify({secId,stepId,done:true,skipped:true})});
  if((await res.json()).ok){
    const jobRes=await apiFetch(capi(`/jobs/${jobId}`));
    const updated=await jobRes.json();
    const idx=jobs.findIndex(j=>j.id===jobId); if(idx>=0) jobs[idx]=updated;
    renderDetail(jobId);
  }
}
async function unskipStep(jobId,secId,stepId){
  const res = await apiFetch(capi(`/jobs/${jobId}/step`),{method:'POST',body:JSON.stringify({secId,stepId,done:false,skipped:false})});
  if((await res.json()).ok){
    const jobRes=await apiFetch(capi(`/jobs/${jobId}`));
    const updated=await jobRes.json();
    const idx=jobs.findIndex(j=>j.id===jobId); if(idx>=0) jobs[idx]=updated;
    renderDetail(jobId);
  }
}
let _uploadLocked = false;
function setUploadUI(busy) {
  _uploadLocked = busy;
  document.querySelectorAll('.upload-zone').forEach(el => {
    el.style.opacity   = busy ? '0.45' : '1';
    el.style.pointerEvents = busy ? 'none' : '';
  });
}

async function uploadSingle(jobId, secId, stepId, input) {
  const file = input.files[0];
  if (!file) return;
  if (_uploadLocked) { alert('Please wait — another upload is in progress.'); input.value = ''; return; }
  _uploadLocked = true;
  const lbl = document.getElementById('lbl-'+stepId);
  if (lbl) { lbl.style.opacity='0.5'; lbl.style.pointerEvents='none'; lbl.childNodes[0].textContent='⟳ Uploading…'; }
  setUploadUI(true);
  try {
    const fd = new FormData();
    fd.append('file', file); fd.append('secId', secId); fd.append('stepId', stepId);
    const res  = await apiUpload(capi(`/jobs/${jobId}/upload`), fd);
    const data = await res.json();
    if (data.ok) {
      const jobRes = await apiFetch(capi(`/jobs/${jobId}`));
      const updated = await jobRes.json();
      const idx = jobs.findIndex(j=>j.id===jobId);
      if (idx>=0) jobs[idx] = updated;
      renderDetail(jobId);
    } else { alert('Upload failed: '+(data.error||'Unknown')); }
  } catch(e) { alert('Upload error: '+e.message); }
  finally { _uploadLocked = false; setUploadUI(false); input.value = ''; }
}

async function uploadMultiple(jobId, secId, stepId, input) {
  const files = Array.from(input.files);
  if (!files.length) return;
  if (_uploadLocked) { alert('Please wait — another upload is in progress.'); input.value = ''; return; }
  _uploadLocked = true;
  setUploadUI(true);
  const lbl = document.getElementById('lbl-'+stepId);
  let done = 0;
  for (const file of files) {
    if (lbl) lbl.innerHTML = `⟳ Uploading ${done+1}/${files.length}…`;
    try {
      const fd = new FormData();
      fd.append('file', file); fd.append('secId', secId); fd.append('stepId', stepId);
      const res  = await apiUpload(capi(`/jobs/${jobId}/upload`), fd);
      const data = await res.json();
      if (!data.ok) { alert('Upload failed for '+file.name+': '+(data.error||'Unknown')); break; }
      done++;
    } catch(e) { alert('Upload error: '+e.message); break; }
  }
  // Refresh job
  try {
    const jobRes = await apiFetch(capi(`/jobs/${jobId}`));
    const updated = await jobRes.json();
    const idx = jobs.findIndex(j=>j.id===jobId);
    if (idx>=0) jobs[idx] = updated;
    renderDetail(jobId);
  } catch(e) {}
  _uploadLocked = false; setUploadUI(false); input.value = '';
}

async function deleteFile(jobId, secId, stepId, filename) {
  const res  = await apiFetch(capi(`/jobs/${jobId}/file`), { method:'DELETE', body:JSON.stringify({secId,stepId,filename}) });
  const data = await res.json();
  if (data.ok) {
    const jobRes = await apiFetch(capi(`/jobs/${jobId}`));
    const updated = await jobRes.json();
    const idx = jobs.findIndex(j=>j.id===jobId);
    if (idx>=0) jobs[idx] = updated;
    renderDetail(jobId);
  }
}

function saveStepNote(jobId, secId, stepId, value) {
  _noteJobId = jobId;
  const job = jobs.find(j=>j.id===jobId); if (!job) return;
  const sec  = job.checklist?.find(s=>s.id===secId);
  const step = sec?.steps.find(s=>s.id===stepId);
  if (!step) return;
  step.noteText = value;
  // Once done is true, it stays true — removing text doesn't uncheck
  if (!step.done) step.done = value.trim().length > 0;
  clearTimeout(_noteTimer);
  _noteTimer = setTimeout(async () => {
    await apiFetch(capi(`/jobs/${jobId}/step`), {
      method:'POST',
      body: JSON.stringify({ secId, stepId, done: step.done, noteText: value })
    });
    _noteJobId = null;
    scheduleRefresh();
  }, 1000);
}

async function clearNote(jobId, secId, stepId) {
  const res = await apiFetch(capi(`/jobs/${jobId}/step`),{method:'POST',body:JSON.stringify({secId,stepId,done:false,noteText:''})});
  if((await res.json()).ok){
    const jobRes=await apiFetch(capi(`/jobs/${jobId}`));
    const updated=await jobRes.json();
    const idx=jobs.findIndex(j=>j.id===jobId); if(idx>=0) jobs[idx]=updated;
    renderDetail(jobId);
  }
}
let _noteTimer = null;

// ── Reschedule ────────────────────────────────────────────────────────────────
function openReschedule(jobId) {
  document.getElementById('reschedule-jobId').value = jobId;
  const j = jobs.find(x=>x.id===jobId);
  document.getElementById('r-date').value = j?.date || '';
  // Set time selects
  const timeParts = (j?.time||'').split(':');
  const rH = document.getElementById('r-time-h');
  const rM = document.getElementById('r-time-m');
  if (rH) rH.value = timeParts[0] || '';
  if (rM) rM.value = timeParts[1] || '00';
  document.getElementById('r-note').value = '';
  document.getElementById('reschedule-modal').classList.add('open');
}
function closeReschedule() { document.getElementById('reschedule-modal').classList.remove('open'); }

async function submitReschedule() {
  const jobId        = document.getElementById('reschedule-jobId').value;
  const proposedDate = document.getElementById('r-date').value;
  const _rH = document.getElementById('r-time-h')?.value;
  const _rM = document.getElementById('r-time-m')?.value;
  const proposedTime = (_rH && _rM) ? _rH+':'+_rM : '';
  const note         = document.getElementById('r-note').value.trim();
  if (!proposedDate) { alert('Please select a proposed date.'); return; }
  const res  = await apiFetch(capi(`/jobs/${jobId}/reschedule`), { method:'POST', body:JSON.stringify({proposedDate, proposedTime, note}) });
  const data = await res.json();
  if (data.ok) {
    closeReschedule();
    const jobRes = await apiFetch(capi(`/jobs/${jobId}`));
    const updated = await jobRes.json();
    const idx = jobs.findIndex(j=>j.id===jobId);
    if (idx>=0) jobs[idx] = updated;
    renderDetail(jobId);
  } else { alert('Error: '+(data.error||'Unknown')); }
}

async function acceptClientSuggestion(jobId) {
  const j = jobs.find(x=>x.id===jobId); if (!j) return;
  const res  = await apiFetch(capi(`/jobs/${jobId}/reschedule/installer-respond`), { method:'POST', body:JSON.stringify({accept:true}) });
  const data = await res.json();
  if (data.ok) {
    // Also mark as accepted
    await apiFetch(capi(`/jobs/${jobId}/accept`), { method:'POST' });
    const jobRes = await apiFetch(capi(`/jobs/${jobId}`));
    const updated = await jobRes.json();
    const idx = jobs.findIndex(j=>j.id===jobId);
    if (idx>=0) jobs[idx] = updated;
    renderDetail(jobId);
  }
}

// ── Activity log renderer ─────────────────────────────────────────────────────
function renderActivityLog(j) {
  const log = j.activityLog || [];
  if (!log.length) return '';
  const rows = log.map(e => `
    <div style="display:flex;gap:10px;padding:7px 0;border-bottom:1px solid #0d1829">
      <div style="width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px;background:${e.role==='client'?'#38bdf8':e.role==='installer'?'#a78bfa':e.role==='admin'?'#34d399':'#475569'}"></div>
      <div style="flex:1">
        <div style="display:flex;align-items:baseline;gap:8px;flex-wrap:wrap">
          <span style="font-size:12px;color:#f1f5f9;font-weight:600">${e.event}</span>
          <span style="font-size:10px;color:#475569">${e.who} · ${e.at}</span>
        </div>
        ${e.detail?`<div style="font-size:11px;color:#64748b;margin-top:2px;font-style:italic">"${e.detail}"</div>`:''}
      </div>
    </div>`).join('');
  return `<div class="card" style="margin-bottom:16px">
    <div class="card-title" style="margin-bottom:10px">📋 Activity Log</div>
    ${rows}
  </div>`;
}

async function markProblemFixed(jobId) {
  const note = document.getElementById('fix-note-'+jobId)?.value.trim();
  if (!note) { alert('Please describe what you fixed before submitting.'); return; }
  const res  = await apiFetch(capi(`/jobs/${jobId}/problem-fixed`),{method:'POST',body:JSON.stringify({note})});
  const data = await res.json();
  if (!data.ok) { alert(data.error||'Error'); return; }
  const jobRes = await apiFetch(capi(`/jobs/${jobId}`));
  const updated = await jobRes.json();
  const idx = jobs.findIndex(j=>j.id===jobId); if(idx>=0) jobs[idx]=updated;
  renderDetail(jobId);
}
