<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Trifusion — Sign In</title>
<link rel="stylesheet" href="/shared.css"/>
<script src="/auth.js"></script>
<style>
  body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#050b14}
  .login-wrap{width:100%;max-width:380px;padding:0 20px}
  .login-logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;justify-content:center}
  .login-logo-icon{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#38bdf8,#6366f1);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:#fff}
  .login-logo-text{font-weight:700;font-size:22px;color:#f1f5f9}
  .login-logo-sub{font-size:12px;color:#64748b}
  .login-card{background:#0a1220;border:1px solid #1e293b;border-radius:16px;padding:32px}
  .login-title{font-size:20px;font-weight:700;color:#f1f5f9;margin-bottom:4px}
  .login-sub{font-size:13px;color:#64748b;margin-bottom:24px}
  .login-field{margin-bottom:16px}
  .login-label{display:block;font-size:12px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
  .login-input{width:100%;background:#050b14;border:1px solid #1e293b;border-radius:10px;padding:11px 14px;color:#f1f5f9;font-size:14px;outline:none;box-sizing:border-box;transition:border-color .15s}
  .login-input:focus{border-color:#38bdf8}
  .login-btn{width:100%;background:linear-gradient(135deg,#38bdf8,#6366f1);border:none;border-radius:10px;padding:13px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;letter-spacing:.02em}
  .login-btn:hover{opacity:.9}
  .login-btn:disabled{opacity:.5;cursor:default}
  .login-error{color:#f87171;font-size:13px;margin-top:10px;text-align:center;min-height:18px}
  .login-footer{text-align:center;margin-top:20px;font-size:12px;color:#475569}
  .login-footer a{color:#38bdf8;text-decoration:none}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-logo">
    <div class="login-logo-icon">T</div>
    <div>
      <div class="login-logo-text">Trifusion</div>
      <div class="login-logo-sub">Fleet Management Platform</div>
    </div>
  </div>
  <div class="login-card">
    <div class="login-title">Welcome back</div>
    <div class="login-sub">Sign in to your portal</div>
    <div class="login-field">
      <label class="login-label">Username</label>
      <input class="login-input" id="username" type="text" autocomplete="username" placeholder="Enter your username"/>
    </div>
    <div class="login-field">
      <label class="login-label">Password</label>
      <input class="login-input" id="password" type="password" autocomplete="current-password" placeholder="Enter your password"/>
    </div>
    <button class="login-btn" id="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-error" id="error-msg"></div>
  </div>
  <div class="login-footer">
    New company? <a href="/signup">Request access</a>
  </div>
</div>
<script>
// If already logged in, redirect
const existing = getAuth();
if (existing && existing.token) {
  redirectUser(existing);
}

function redirectUser(auth) {
  if (auth.role === 'hq')        { window.location.href = '/hq'; return; }
  if (auth.role === 'admin')     { window.location.href = '/'+auth.companyId+'/admin'; return; }
  if (auth.role === 'client')    { window.location.href = '/'+auth.companyId+'/client'; return; }
  if (auth.role === 'installer') { window.location.href = '/'+auth.companyId+'/installer'; return; }
}

document.addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

async function doLogin() {
  const username = document.getElementById('username').value.trim().toLowerCase();
  const password = document.getElementById('password').value;
  const errEl    = document.getElementById('error-msg');
  const btn      = document.getElementById('login-btn');
  errEl.textContent = '';
  if (!username || !password) { errEl.textContent = 'Please enter your username and password.'; return; }
  btn.disabled = true; btn.textContent = 'Signing in…';
  try {
    const res  = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username,password}) });
    const data = await res.json();
    if (!data.ok) { errEl.textContent = data.error||'Invalid username or password.'; btn.disabled=false; btn.textContent='Sign In'; return; }
    setAuth({ token:data.token, role:data.role, name:data.name||username, username,
              companyId:data.companyId||null, companyName:data.companyName||null,
              installer:data.installer||null, clientId:data.clientId||null,
              clientCompanyName:data.clientCompanyName||null,
              installerCompanyName:data.installerCompanyName||null });
    redirectUser(data);
  } catch(e) {
    errEl.textContent = 'Could not connect to server.';
    btn.disabled=false; btn.textContent='Sign In';
  }
}
</script>
<div style="position:fixed;bottom:0;left:0;right:0;height:26px;background:#050b14;border-top:1px solid #0d1829;display:flex;align-items:center;justify-content:center;z-index:50;pointer-events:none">
  <span style="font-size:11px;color:#1e293b;letter-spacing:.08em;font-weight:600">POWERED BY</span>
  <span style="font-size:11px;color:#334155;font-weight:700;margin-left:6px;letter-spacing:.04em">WEBANCHOR</span>
</div>
<div style="height:26px"></div><!-- footer spacer -->
</body>
</html>
